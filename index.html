<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nana Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header id="site-header">
    <h1 class="logo">Nana Shop</h1>
    <p class="tagline">Kenya's Online Store</p>
  </header>

  <nav id="main-nav">
    <ul class="nav-list">
      <li><a href="#" class="nav-link">Home</a></li>
      <li><a href="#" class="nav-link">Products</a></li>
      <li><a href="#" class="nav-link">Contact</a></li>
    </ul>
  </nav>

  <main id="main-content">

    <section id="products" class="section">
      <h2 class="section-title">Featured Products</h2>

      <article class="product-card">
        <figure class="product-image">
          <img src="https://placehold.co/300x180/fff8ed/e08f00?text=Kikoy+Wrap" alt="Kikoy Wrap" />
          <figcaption class="image-caption">Handwoven Kenyan Kikoy</figcaption>
        </figure>
        <h3 class="product-name">Kikoy Wrap</h3>
        <p class="product-price">KSh 1,200</p>
        <p class="product-date">Added: <time datetime="2026-07-07">7 July 2026</time></p>
      </article>

      <article class="product-card">
        <figure class="product-image">
          <img src="https://placehold.co/300x180/fff8ed/e08f00?text=Beaded+Necklace" alt="Beaded Necklace" />
          <figcaption class="image-caption">Maasai Beaded Necklace</figcaption>
        </figure>
        <h3 class="product-name">Beaded Necklace</h3>
        <p class="product-price">KSh 850</p>
        <p class="product-date">Added: <time datetime="2026-07-05">5 July 2026</time></p>
      </article>

    </section>

    <aside id="sidebar">
      <h3 class="sidebar-title">Categories</h3>
      <ul class="category-list">
        <li class="category-item">Fashion</li>
        <li class="category-item">Electronics</li>
        <li class="category-item">Accessories</li>
      </ul>
    </aside>

  </main>

  <footer id="site-footer">
    <p class="footer-text">
      &copy; <time datetime="2026">2026</time> Nana Shop. Nairobi, Kenya.
    </p>
  </footer>

</body>
</html>
