<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nana Shop</title>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Nana Shop</h1>

    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <!-- MAIN CONTENT -->
  <main>

    <section>
      <h2>Featured Products</h2>

      <!-- ARTICLE -->
      <article>
        <h3>Kikoy Wrap</h3>
        <p>A beautiful traditional Kenyan fabric.</p>

        <!-- FIGURE + FIGCAPTION -->
        <figure>
          <img src="kikoy.jpg" alt="Kikoy Wrap" />
          <figcaption>Handwoven Kenyan Kikoy — KSh 1,200</figcaption>
        </figure>

        <!-- TIME -->
        <p>Added: <time datetime="2026-07-07">7 July 2026</time></p>

    </section>

    <!-- ASIDE -->
    <aside>
      <h3>Categories</h3>
      <ul>
        <li>Fashion</li>
        <li>Electronics</li>
        <li>Accessories</li>
      </ul>
    </aside>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; <time datetime="2026">2026</time> Nana Shop. Nairobi, Kenya.</p>
  </footer>

</html>
